# BUHUB Backend — Postgres + Redis + app on one host.
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires .env: POSTGRES_PASSWORD, JWT_SECRET, NEXT_PUBLIC_APP_URL, etc.
#
# If PostgreSQL is external (Lightsail / RDS), do NOT use this file — use:
#   docker compose -f docker-compose.prod.external-db.yml ...

networks:
  buhub:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: buhub-postgres
    restart: unless-stopped
    networks:
      - buhub
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-buhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buhub-redis
    restart: unless-stopped
    networks:
      - buhub
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${BUHUB_IMAGE:-ghcr.io/david-zhang-test/buhub-back:latest}
    container_name: buhub-app
    restart: unless-stopped
    networks:
      - buhub
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
      - log_data:/app/logs
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      DATABASE_URL: postgresql://${POSTGRES_USER:-buhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-buhub}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # hCaptcha (send-code verification)
      HCAPTCHA_SECRET_KEY: ${HCAPTCHA_SECRET_KEY:-}
      # Email (Resend API)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Azure Translator
      AZURE_TRANSLATOR_ENDPOINT: ${AZURE_TRANSLATOR_ENDPOINT:-}
      AZURE_TRANSLATOR_KEY: ${AZURE_TRANSLATOR_KEY:-}
      AZURE_TRANSLATOR_REGION: ${AZURE_TRANSLATOR_REGION:-}
      # Content Moderation (OpenAI)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_CLOUD_VISION_API_KEY: ${GOOGLE_CLOUD_VISION_API_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    image: node:20-bookworm-slim
    container_name: buhub-migrate
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "apt-get update -y && apt-get install -y openssl libssl3 && npm install && npx prisma generate && npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-buhub}
    networks:
      - buhub
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: buhub_postgres_data
  redis_data:
    name: buhub_redis_data
  uploads_data:
    name: buhub_uploads_data
  log_data:
    name: buhub_log_data
